<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>产品管理 — LicenseSDK 管理后台</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <h1>LicenseSDK <small>管理后台</small></h1>
    <nav>
      <a data-page="dashboard" href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="13"/><line x1="9" y1="20" x2="9" y2="6"/><line x1="14" y1="20" x2="14" y2="16"/><line x1="19" y1="20" x2="19" y2="9"/></svg> 仪表盘</a>
      <a data-page="products" href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><polyline points="3 9 12 5 21 9"/><polyline points="3 9 12 13 21 9"/><path d="M3 9v8l9 4 9-4V9"/></svg> 产品管理</a>
      <a data-page="licenses" href="licenses.html"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="8" cy="16" r="4"/><path d="M11 12l7.5-8"/><path d="M15 6l2 2"/><path d="M18 4l3 3"/></svg> License 管理</a>
      <a data-page="audit-log" href="audit-log.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg> 审计日志</a>
    </nav>
    <div class="logout"><a href="#" onclick="logout()"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 3H6a2 2 0 00-2 2v14a2 2 0 002 2h4"/><path d="M16 17l5-5-5-5"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 退出登录</a></div>
  </aside>
  <main class="main-content">
    <div class="flex justify-between items-center mb-4">
      <h2 class="page-title" style="margin-bottom:0">产品管理</h2>
      <button class="btn-primary" onclick="showCreateForm()">+ 创建产品</button>
    </div>

    <!-- Create form (hidden by default) -->
    <div id="createForm" class="card" style="display:none">
      <h3>创建新产品</h3>
      <div class="form-group">
        <label>产品名称</label>
        <input type="text" id="prodName" placeholder="例如: MyApp v1.0">
      </div>
      <div class="form-group">
        <label>描述（可选）</label>
        <textarea id="prodDesc" placeholder="产品描述…"></textarea>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary" onclick="createProduct()">创建</button>
        <button onclick="hideCreateForm()">取消</button>
      </div>
    </div>

    <!-- Product list -->
    <div class="card">
      <h3>产品列表</h3>
      <div id="productList"><div class="loading">加载中</div></div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
requireAuth();
highlightNav('products');

function showCreateForm() { document.getElementById('createForm').style.display = 'block'; }
function hideCreateForm() { document.getElementById('createForm').style.display = 'none'; }

async function createProduct() {
  const name = document.getElementById('prodName').value.trim();
  if (!name) { toast('请输入产品名称', 'warning'); return; }
  const desc = document.getElementById('prodDesc').value.trim();
  try {
    await api('/products', { method: 'POST', body: JSON.stringify({ name, description: desc || undefined }) });
    toast('产品创建成功');
    document.getElementById('prodName').value = '';
    document.getElementById('prodDesc').value = '';
    hideCreateForm();
    loadProducts();
  } catch (err) { toast(err.message, 'error'); }
}

async function loadProducts() {
  const container = document.getElementById('productList');
  try {
    const data = await api('/products');
    container.innerHTML = data && data.length > 0
      ? `<table>
          <thead><tr><th>名称</th><th>描述</th><th>创建时间</th><th>ID</th></tr></thead>
          <tbody>${data.map(p => `<tr>
            <td>${p.name}</td>
            <td class="text-muted">${p.description || '—'}</td>
            <td class="mono">${fmtDate(p.created_at)}</td>
            <td class="mono" style="font-size:11px">${p.id}</td>
          </tr>`).join('')}</tbody></table>`
      : '<div class="empty-state">暂无产品，请创建一个</div>';
  } catch (err) { showError(container, err.message); }
}
loadProducts();
</script>
</body>
</html>
