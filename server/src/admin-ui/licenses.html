<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>License 管理 — LicenseSDK 管理后台</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <h1>LicenseSDK <small>管理后台</small></h1>
    <nav>
      <a data-page="dashboard" href="dashboard.html"><svg class="nav-icon" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="13"/><line x1="9" y1="20" x2="9" y2="6"/><line x1="14" y1="20" x2="14" y2="16"/><line x1="19" y1="20" x2="19" y2="9"/></svg> 仪表盘</a>
      <a data-page="products" href="products.html"><svg class="nav-icon" viewBox="0 0 24 24"><polyline points="3 9 12 5 21 9"/><polyline points="3 9 12 13 21 9"/><path d="M3 9v8l9 4 9-4V9"/></svg> 产品管理</a>
      <a data-page="licenses" href="licenses.html"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="8" cy="16" r="4"/><path d="M11 12l7.5-8"/><path d="M15 6l2 2"/><path d="M18 4l3 3"/></svg> License 管理</a>
      <a data-page="audit-log" href="audit-log.html"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="12" y2="16"/></svg> 审计日志</a>
    </nav>
    <div class="logout"><a href="#" onclick="logout()"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 3H6a2 2 0 00-2 2v14a2 2 0 002 2h4"/><path d="M16 17l5-5-5-5"/><line x1="21" y1="12" x2="9" y2="12"/></svg> 退出登录</a></div>
  </aside>
  <main class="main-content">
    <div class="flex justify-between items-center mb-4">
      <h2 class="page-title" style="margin-bottom:0">License 管理</h2>
      <button class="btn-primary" onclick="showIssueForm()">+ 签发 License</button>
    </div>

    <!-- Issue form (hidden) -->
    <div id="issueForm" class="card" style="display:none">
      <h3>签发新 License</h3>
      <div class="form-group">
        <label>产品</label>
        <select id="issueProduct"></select>
      </div>
      <div class="form-group">
        <label>License Key</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="issueKey" placeholder="XXXX-XXXX-XXXX-XXXX" style="flex:1">
          <button type="button" onclick="generateKey()" style="white-space:nowrap">随机生成</button>
        </div>
      </div>
      <div class="form-inline">
        <div class="form-group">
          <label>类型</label>
          <select id="issueType">
            <option value="single">Single（单设备）</option>
            <option value="volume">Volume（多设备）</option>
            <option value="subscription">Subscription（订阅）</option>
          </select>
        </div>
        <div class="form-group">
          <label>最大激活数</label>
          <input type="number" id="issueMax" value="1" min="1">
        </div>
      </div>
      <div class="form-group">
        <label>过期时间（可选）</label>
        <input type="datetime-local" id="issueExpires">
      </div>
      <div class="flex gap-2">
        <button class="btn-primary" onclick="issueLicense()">签发</button>
        <button onclick="hideIssueForm()">取消</button>
      </div>
    </div>

    <!-- License list -->
    <div class="card">
      <h3>License 列表</h3>
      <div id="licenseList"><div class="loading">加载中</div></div>
    </div>
  </main>
</div>

<script src="admin.js"></script>
<script>
requireAuth();
highlightNav('licenses');

let productsCache = [];

function showIssueForm() { document.getElementById('issueForm').style.display = 'block'; loadProductSelect(); }
function hideIssueForm() { document.getElementById('issueForm').style.display = 'none'; }

function generateKey() {
  const CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const seg = () => Array.from({length:4}, () => CHARS[Math.floor(Math.random() * CHARS.length)]).join('');
  document.getElementById('issueKey').value = [seg(), seg(), seg(), seg()].join('-');
}

async function loadProductSelect() {
  try {
    const data = await api('/products');
    productsCache = data ?? [];
    const sel = document.getElementById('issueProduct');
    sel.innerHTML = productsCache.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    if (productsCache.length === 0) {
      sel.innerHTML = '<option value="">— 请先创建产品 —</option>';
    }
  } catch (err) { toast('加载产品列表失败: ' + err.message, 'error'); }
}

async function issueLicense() {
  const product_id = document.getElementById('issueProduct').value;
  if (!product_id) { toast('请选择产品', 'warning'); return; }
  const license_key = document.getElementById('issueKey').value.trim();
  if (!license_key) { toast('请输入 License Key', 'warning'); return; }
  const type = document.getElementById('issueType').value;
  const max_activations = parseInt(document.getElementById('issueMax').value) || 1;
  const expiresRaw = document.getElementById('issueExpires').value;
  const expires_at = expiresRaw ? new Date(expiresRaw).toISOString() : null;

  try {
    await api('/licenses', {
      method: 'POST',
      body: JSON.stringify({ product_id, license_key, type, max_activations, expires_at }),
    });
    toast('License 签发成功');
    document.getElementById('issueKey').value = '';
    hideIssueForm();
    loadLicenses();
  } catch (err) { toast(err.message, 'error'); }
}

async function revokeLicense(id) {
  if (!confirm('确定要吊销此 License 吗？此操作不可撤销。')) return;
  try {
    await api(`/licenses/${id}/revoke`, { method: 'POST' });
    toast('已吊销');
    loadLicenses();
  } catch (err) { toast(err.message, 'error'); }
}

async function loadLicenses() {
  const container = document.getElementById('licenseList');
  try {
    const data = await api('/licenses');
    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty-state">暂无 License，请签发一个</div>';
      return;
    }
    const productMap = {};
    productsCache.forEach(p => { productMap[p.id] = p.name; });

    let html = `<table>
      <thead><tr><th>Key</th><th>产品</th><th>类型</th><th>状态</th><th>激活数</th><th>过期</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody>`;
    data.forEach(l => {
      const actCount = l.activations
        ? (typeof l.activations === 'number' ? l.activations : l.activations.count ?? 0)
        : 0;
      const isExpired = l.expires_at && new Date(l.expires_at) < new Date();
      const status = isExpired && l.status === 'active' ? 'expired' : l.status;
      const badgeClass = status === 'active' ? 'badge-active' : status === 'revoked' ? 'badge-revoked' : 'badge-deactivated';
      html += `<tr>
        <td class="mono">${l.license_key}</td>
        <td>${productMap[l.product_id] || l.product_id?.substring(0, 8) || '—'}</td>
        <td>${l.type}</td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
        <td>${actCount} / ${l.max_activations}</td>
        <td class="mono">${fmtDate(l.expires_at)}</td>
        <td class="mono">${fmtDate(l.created_at)}</td>
        <td>
          ${status === 'active'
            ? `<button class="btn-danger btn-sm" onclick="revokeLicense('${l.id}')">吊销</button>
               <button class="btn-sm" onclick="viewActivations('${l.id}')" style="margin-left:4px">激活</button>`
            : '<span class="text-muted">—</span>'}
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (err) { showError(container, err.message); }
}

function viewActivations(licenseId) {
  // Store license ID and navigate to activations page (admin-jump)
  sessionStorage.setItem('viewLicenseId', licenseId);
  window.location.href = '/admin/activations.html';
}

loadLicenses();
</script>
</body>
</html>
